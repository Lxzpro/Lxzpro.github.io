<!DOCTYPE html>
<html lang="en">
	<head>

		<title>博客编辑页</title>
		<link rel="stylesheet" href="css/common.css">
		<link rel="stylesheet" href="css/blog_edit.css">

		<style>
			.grid-container {
				display: grid;
				grid-column-gap: 10px;
				grid-row-gap: 10px;
				grid-template-columns: auto auto auto;
				background-color: rgba(170, 255, 255, 0);
				;
				padding: 5px;
			}

			.grid-item {
				background-color: rgba(170, 255, 255, 0);
				border: 1px solid rgba(85, 255, 255, 0);
				padding: 0px;
				font-size: 30px;
				text-align: center;
			}
		</style>
	</head>
	<body>
		<!-- 导航栏 -->
		<div class="nav">
			<img src="image/log.png" alt="">
			<span class="title">我的博客系统</span>
			<!-- 使用 span 把左右两侧的元素给撑开 -->
			<span class="spacer"></span>
			<a href="blog_list.html">主页</a>
			<a href="blog_edit.html">写博客</a>
			<a href="#">相册</a>
			<a href="blog_login.html">注销</a>
		</div>
		<!-- 版心 -->
		<div class="grid-container">
			<div class="grid-item">
				<img src="image/head.jpg" width="300" height=auto>
			</div>
			<div class="grid-item">
				<img src="image/picture.jpg" width="300" height=auto>
			</div>
			<div class="grid-item">
				<img src="image/picture (2).jpg" width="300" height=auto>
			</div>
			<div class="grid-item">
				<img src="image/picture (3).jpg" width="300" height=auto>
			</div>
			<div class="grid-item">
				<img src="image/picture (4).jpg" width="300" height=auto>
			</div>
			<div class="grid-item">
				<img src="image/picture (5).jpg" width="300" height=auto>
			</div>
			<div class="grid-item">
				<img src="image/picture (6).jpg" width="300" height=auto>
			</div>
			<div class="grid-item">

			</div>
		</div>
	</body>
</html>
