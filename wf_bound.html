<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王凡的棒肉大</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#FF7D00',
                        accent: '#FF3A3A',
                        dark: '#1E293B',
                        light: '#F8FAFC'
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                    },
                },
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .text-glow {
                text-shadow: 0 0 10px rgba(255, 58, 58, 0.8), 0 0 20px rgba(255, 58, 58, 0.6), 0 0 30px rgba(255, 58, 58, 0.4);
            }
            .text-glow-primary {
                text-shadow: 0 0 10px rgba(22, 93, 255, 0.8), 0 0 20px rgba(22, 93, 255, 0.6), 0 0 30px rgba(22, 93, 255, 0.4);
            }
            .animate-pulse-slow {
                animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            }
            .backdrop-blur {
                backdrop-filter: blur(8px);
            }
        }
    </style>
</head>
<body class="bg-dark text-light min-h-screen flex items-center justify-center overflow-hidden">
    <!-- 背景效果 -->
    <div class="fixed inset-0 bg-gradient-to-br from-dark to-slate-900 z-0"></div>
    <div class="fixed inset-0 z-0 opacity-30">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/20 rounded-full blur-3xl animate-pulse-slow"></div>
        <div class="absolute bottom-1/3 right-1/4 w-96 h-96 bg-accent/20 rounded-full blur-3xl animate-pulse-slow" style="animation-delay: 2s"></div>
    </div>
    
    <!-- 中心内容 -->
    <div class="container mx-auto px-4 z-10 text-center">
        <h2 class="text-[clamp(1.5rem,5vw,3rem)] font-bold mb-4 text-primary text-glow-primary">
            你好，我是王凡
        </h2>
        <h1 class="text-[clamp(2.5rem,8vw,5rem)] font-black mb-8 text-accent text-glow">
            我的棒肉大
        </h1>
        
        <!-- 强调按钮 -->
        <button class="bg-accent hover:bg-accent/90 text-white px-10 py-4 rounded-full text-xl font-bold transition-all duration-300 hover:shadow-lg hover:shadow-accent/30 hover:scale-110 focus:outline-none focus:ring-2 focus:ring-accent focus:ring-opacity-50">
            <i class="fa fa-bolt mr-2"></i> 王凡的棒肉大
        </button>
    </div>
</body>
</html>
